<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nonogram Puzzles</title>
  <link rel="stylesheet" href="/static/css/nonogram.css">
</head>
<body>
  <header class="page-header">
    <h1>Nonogram Puzzles</h1>
    <p>Choose a puzzle to solve.</p>
  </header>

  <main>
    <div id="puzzle-list" class="puzzle-list">
      <p class="loading">Loading puzzles...</p>
    </div>
  </main>

  <script>
    "use strict";

    fetch("/api/puzzles")
      .then((res) => res.json())
      .then((data) => {
        const container = document.getElementById("puzzle-list");
        container.innerHTML = "";

        if (!data.puzzles || data.puzzles.length === 0) {
          container.innerHTML = "<p class=\"error-msg\">No puzzles found.</p>";
          return;
        }

        data.puzzles.forEach((name) => {
          const card = document.createElement("button");
          card.className = "puzzle-card";

          const parts = name.split("/");
          const filename = parts[parts.length - 1];

          const dimMatch = filename.match(/_w(\d+)_h(\d+)$/);
          const size = dimMatch ? `${dimMatch[1]}×${dimMatch[2]}` : "";

          const displayName = filename
            .replace(/_w\d+_h\d+$/, "")
            .replace(/_/g, " ");

          const category = parts.length > 1 ? parts[0] : "";

          const meta = [category, size].filter(Boolean).join(" · ");

          card.innerHTML =
            `<div class="puzzle-name">${displayName}</div>` +
            (meta ? `<div class="puzzle-meta">${meta}</div>` : "");

          card.addEventListener("click", () => {
            window.location.href = `/puzzle?name=${encodeURIComponent(name)}`;
          });

          container.appendChild(card);
        });
      })
      .catch(() => {
        document.getElementById("puzzle-list").innerHTML =
          "<p class=\"error-msg\">Failed to load puzzles.</p>";
      });
  </script>
</body>
</html>
