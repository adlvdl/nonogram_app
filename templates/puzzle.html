<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nonogram</title>
  <link rel="stylesheet" href="/static/css/nonogram.css">
</head>
<body>
  <main class="puzzle-page">
    <a href="/" class="back-link">Back to puzzles</a>

    <h1 id="puzzle-title" class="puzzle-title"></h1>
    <p id="puzzle-timer" class="puzzle-timer">0:00</p>

    <p id="puzzle-loading" class="loading">Loading puzzle...</p>
    <p id="puzzle-error" class="error-msg"></p>

    <div class="nonogram-wrapper">
      <div id="nonogram-container"></div>
    </div>
  </main>

  <!-- Congratulations overlay -->
  <div id="congrats-overlay" class="overlay">
    <div class="congrats-box">
      <h2>Solved!</h2>
      <p id="congrats-time"></p>
      <p id="congrats-best" class="congrats-best-time"></p>
      <div class="congrats-actions">
        <button id="btn-play-again" class="btn-primary">Reset puzzle</button>
        <a href="/" class="btn-secondary">Back to puzzles</a>
      </div>
    </div>
  </div>

  <script src="/static/js/best_times.js"></script>
  <script src="/static/js/timer.js"></script>
  <script src="/static/js/grid.js"></script>
  <script src="/static/js/solution_checker.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
